<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body.dark{background:#181818;color:white;}
body{margin:0;font-family:system-ui;display:flex;height:100vh;}

/* SPLASH */
#splash{
position:fixed;width:100%;height:100%;
background:#0f172a;display:flex;justify-content:center;align-items:center;
z-index:9999;
}
#logoAnim{
width:80px;height:80px;border-radius:50%;
overflow:hidden;animation:zoomFade 1.5s ease forwards;
}
#logoAnim img{width:100%;height:100%;object-fit:cover;}
@keyframes zoomFade{
0%{transform:scale(0.6);opacity:0;}
100%{transform:scale(1);}
}

/* SIDEBAR */
.sidebar{
width:220px;background:#202123;padding:12px;
display:flex;flex-direction:column;justify-content:space-between;
transition:.3s;
}
.sidebar.collapsed{width:70px;}
.sidebar.collapsed .btn span,
.sidebar.collapsed .yourChats,
.sidebar.collapsed .chatItem,
.sidebar.collapsed .account,
.sidebar.collapsed .planBtn{display:none;}
.sidebar.collapsed .btn{justify-content:center;}

.logoRow{display:flex;justify-content:space-between;margin-bottom:10px;}
.logoWrap{width:28px;height:28px;border-radius:50%;overflow:hidden;}
.logoWrap img{width:100%;}
.toggleBtn{cursor:pointer;padding:6px;}
.toggleBtn:hover{background:#2a2b32;}

.btn{
display:flex;align-items:center;gap:10px;
padding:10px;border:none;border-radius:8px;
margin:4px 0;background:transparent;color:inherit;cursor:pointer;
}
.btn:hover{background:#2a2b32;}
.btn svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;}

/* CHATS */
.yourChats{font-size:14px;margin:10px 0;color:#aaa;}
.chatItem{display:flex;justify-content:space-between;padding:8px;border-radius:6px;}
.chatItem:hover{background:#2a2b32;}
.left{display:flex;gap:6px;align-items:center;}
.dot{width:6px;height:6px;background:white;border-radius:50%;}

/* MENU 3 */
.menu3{
position:absolute;right:-200px;width:200px;
background:#2a2a2a;border-radius:10px;
display:none;flex-direction:column;
}
.menu3 button{
display:flex;gap:10px;align-items:center;
background:none;border:none;color:white;
padding:10px;font-size:13px;cursor:pointer;
}
.menu3 button:hover{background:#3a3a3a;}
.menu3 svg{width:16px;height:16px;stroke:currentColor;fill:none;}
.menu3 hr{border:1px solid #444;}

.delete{color:#ff3b3b;}
.delete svg{stroke:#ff3b3b;}

/* ACCOUNT */
.account{display:flex;gap:10px;padding:8px;}
.avatar{width:30px;height:30px;background:#444;border-radius:50%;}
.plan{font-size:11px;color:#aaa;}
.planBtn{background:#2a2a2a;padding:8px;border-radius:20px;text-align:center;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;}
.topbar{height:50px;display:flex;justify-content:space-between;padding:0 15px;border-bottom:1px solid #444;}
.chat{flex:1;padding:20px;}
.message{margin:10px 0;padding:10px;border-radius:10px;}
.user{background:#3b82f6;margin-left:auto;}
.bot{background:#333;}

/* INPUT */
.inputBox{
display:flex;gap:10px;background:#2a2a2a;
padding:10px;border-radius:20px;margin:10px;
}
input{flex:1;background:none;border:none;color:white;outline:none;}
.actionBtn{background:#2f2f2f;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sendActive{background:#10a37f;}
</style>
</head>

<body class="dark">

<div id="splash">
<div id="logoAnim"><img src="logo.png"></div>
</div>

<div id="app" style="display:none;width:100%;display:flex;">

<div class="sidebar">
<div>

<div class="logoRow">
<div class="logoWrap"><img src="logo.png"></div>
<div class="toggleBtn" onclick="toggleSidebar()">☰</div>
</div>

<button class="btn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>New chat</span></button>

<!-- 🔥 NEW ICON -->
<button class="btn">
<svg viewBox="0 0 24 24">
<path d="M12 3l2.5 6.5L21 12l-6.5 2.5L12 21l-2.5-6.5L3 12l6.5-2.5z"/>
</svg>
<span>Deep search</span>
</button>

<div class="yourChats">Your Chats</div>

<div class="chatItem">
<div class="left"><div class="dot"></div><span>Example</span></div>
<div onclick="toggleMenu3(event)">⋯</div>

<div class="menu3">
<button>Share</button>
<button>Rename</button>
<hr>
<button class="delete">Delete</button>
</div>
</div>

</div>

<div>
<div class="account">
<div class="avatar"></div>
<div>
<div>Pranab</div>
<div class="plan">Free</div>
</div>
</div>
<div class="planBtn">Upgrade</div>
</div>
</div>

<div class="main">
<div class="topbar">StudyGenius AI</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
<input id="q" placeholder="Message...">
<div class="actionBtn" onclick="sendMsg()">➤</div>
</div>
</div>

</div>

<script>
window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("app").style.display="flex";
},1200);
};

function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("collapsed");
}

function toggleMenu3(e){
e.stopPropagation();
document.querySelectorAll(".menu3").forEach(m=>m.style.display="none");
e.target.parentElement.querySelector(".menu3").style.display="flex";
}
document.addEventListener("click",()=>{
document.querySelectorAll(".menu3").forEach(m=>m.style.display="none");
});

function sendMsg(){
let q=document.getElementById("q");
if(q.value){
let chat=document.getElementById("chat");
chat.innerHTML+=`<div class="message user">${q.value}</div>`;
chat.innerHTML+=`<div class="message bot">Response...</div>`;
q.value="";
}
}
</script>

</body>
</html>
